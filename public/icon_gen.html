<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Icon Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #333;
            /* Dark background to see the icon clearly */
        }

        #icon-container {
            width: 1024px;
            height: 1024px;
            /* Olive Green / Sage Gradient Background */
            background: linear-gradient(135deg, #6F7B6D 0%, #8F9B8D 50%, #B5C2A3 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The Glossy Sheen (Top Half) - Adjusted for darker background */
        .sheen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-bottom-left-radius: 100% 20%;
            border-bottom-right-radius: 100% 20%;
            pointer-events: none;
            z-index: 10;
        }

        /* Subtle Inner Border/Glow */
        .inner-glow {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
        }

        /* The Logo (Masked for Gold Color) */
        .logo {
            width: 760px;
            height: 760px;
            /* The Gold Color */
            background-color: #E5D6A7;
            /* Masking */
            mask-image: url('/logo-light.png');
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-image: url('/logo-light.png');
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            z-index: 5;
        }

        /* Decorative Background Elements (Subtle) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: rgba(181, 194, 163, 0.3);
            /* Sage */
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.6);
            bottom: -50px;
            left: -50px;
        }
    </style>
</head>

<body>
    <div id="icon-container">
        <div class="sheen"></div>
        <div class="inner-glow"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <!-- CSS Mask Logo: Guarantees Exact Gold Color (#E5D6A7) and Cleaner Edges -->
        <div class="logo"></div>
    </div>
</body>

</html>
