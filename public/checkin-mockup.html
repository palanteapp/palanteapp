<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Palante · Check-in Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #415D43;
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }

  .app-shell {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #4A6B4C 0%, #2D4A2F 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px 24px;
    overflow: hidden;
  }
  .bg-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .app-shell-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #D4B882;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }
  .app-shell-title {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #FAF7F3;
    position: relative;
    z-index: 1;
    letter-spacing: -0.02em;
  }

  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.4s ease;
    pointer-events: none;
    z-index: 10;
  }
  .backdrop.active {
    background: rgba(0,0,0,0.55);
    pointer-events: auto;
  }

  .sheet {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    border-radius: 32px 32px 0 0;
    background: #1E3A28;
    padding: 0 0 44px;
    z-index: 20;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
    overflow: hidden;
  }
  .sheet.open { transform: translateY(0); }

  .sheet-art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .sheet-inner {
    position: relative;
    z-index: 1;
    padding: 28px 24px 0;
  }

  .handle {
    width: 40px; height: 4px;
    background: #4A7050;
    border-radius: 99px;
    margin: 0 auto 28px;
  }

  .coach-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .coach-avatar {
    width: 38px; height: 38px;
    border-radius: 13px;
    background: #2A4E34;
    border: 1.5px solid #D4B882;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .coach-name {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #D4B882;
  }

  .question {
    font-family: 'Poppins', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #FAF7F3;
    line-height: 1.3;
    letter-spacing: -0.02em;
    margin-bottom: 26px;
  }

  .feelings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .feeling-btn {
    padding: 15px 14px;
    border-radius: 18px;
    border: 1.5px solid #3A5E42;
    background: #243E2C;
    color: #C8E0CA;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .feeling-btn:hover {
    background: #2D4F37;
    border-color: #5A8060;
    color: #FAF7F3;
  }
  .feeling-btn.selected {
    background: #C96A3A;
    border-color: #C96A3A;
    color: #FAF7F3;
    box-shadow: 0 0 22px rgba(201,106,58,0.5);
  }
  .feeling-btn.selected .pill-icon { color: #E5D6A7; }
  .pill-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #7AAD80;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .dismiss-btn {
    display: block;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #4A7050;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    width: 100%;
    transition: color 0.2s;
  }
  .dismiss-btn:hover { color: #7AAD80; }

  .response-block {
    display: none;
    flex-direction: column;
    gap: 18px;
  }
  .response-block.visible { display: flex; }

  .coach-response {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: #C8E0CA;
    line-height: 1.65;
  }
  .coach-response strong {
    color: #FAF7F3;
    font-weight: 700;
  }

  .suggestion-card {
    border-radius: 20px;
    background: #243E2C;
    border: 1.5px solid #D4B882;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .suggestion-card:hover {
    background: #2D4F37;
    border-color: #E5D6A7;
  }
  .suggestion-icon-wrap {
    width: 50px; height: 50px;
    border-radius: 15px;
    background: #C96A3A;
    border: 1.5px solid #D4845A;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #FAF7F3;
  }
  .suggestion-text { flex: 1; }
  .suggestion-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #FAF7F3;
    margin-bottom: 3px;
  }
  .suggestion-sub {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #D4B882;
  }
  .suggestion-arrow {
    color: #C96A3A;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    padding: 17px;
    border-radius: 18px;
    background: #C96A3A;
    border: none;
    color: #FAF7F3;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 24px rgba(201,106,58,0.45);
    -webkit-tap-highlight-color: transparent;
  }
  .cta-btn:hover { filter: brightness(1.1); }
  .cta-btn:active { transform: scale(0.98); }

  .trigger-wrap {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .trigger-wrap.hidden { opacity: 0; pointer-events: none; }
  .trigger-btn {
    background: #C96A3A;
    border: none;
    color: #FAF7F3;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 32px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 24px rgba(201,106,58,0.5);
    -webkit-tap-highlight-color: transparent;
  }
  .trigger-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .trigger-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #D4B882;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .state-block { display: none; }
  .state-block.active { display: block; }

  .transition-overlay {
    position: absolute;
    inset: 0;
    background: #1E3A28;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    border-radius: 32px 32px 0 0;
  }
  .transition-overlay.flash { opacity: 1; }
</style>
</head>
<body>

<div class="app-shell">
  <!-- Background rings: vivid, solid colors — no opacity wash -->
  <svg class="bg-svg" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <!-- Large sage ring top-right — lighter sage so it pops against dark bg -->
    <circle cx="370" cy="110" r="240" fill="none" stroke="#6B9B6E" stroke-width="56"/>
    <!-- Inner detail ring, gold -->
    <circle cx="370" cy="110" r="175" fill="none" stroke="#D4B882" stroke-width="1.5"/>
    <!-- Innermost thin ring -->
    <circle cx="370" cy="110" r="115" fill="none" stroke="#A8C9AA" stroke-width="1"/>
    <!-- Gold accent ring top-left -->
    <circle cx="20"  cy="200" r="160" fill="none" stroke="#D4B882" stroke-width="2"/>
    <!-- Terracotta ring bottom -->
    <circle cx="290" cy="780" r="200" fill="none" stroke="#C96A3A" stroke-width="50"/>
    <!-- Terracotta inner ring detail -->
    <circle cx="290" cy="780" r="140" fill="none" stroke="#E5A07A" stroke-width="1.5"/>
  </svg>

  <div class="app-shell-label">Palante</div>
  <div class="app-shell-title">Good afternoon, Michael</div>
</div>

<div class="trigger-wrap" id="triggerWrap">
  <div class="trigger-label">Demo</div>
  <button class="trigger-btn" onclick="openSheet()">See your daily check-in</button>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">

  <!-- Sheet art: vivid rings, no opacity reduction -->
  <svg class="sheet-art" viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <!-- Terracotta ring top-right -->
    <circle cx="420" cy="50"  r="230" fill="none" stroke="#C96A3A" stroke-width="58"/>
    <!-- Gold inner detail -->
    <circle cx="420" cy="50"  r="165" fill="none" stroke="#D4B882" stroke-width="1.5"/>
    <!-- Sage ring left -->
    <circle cx="-20" cy="190" r="180" fill="none" stroke="#4A7050" stroke-width="52"/>
    <!-- Sage inner detail -->
    <circle cx="-20" cy="190" r="118" fill="none" stroke="#7AAD80" stroke-width="1.5"/>
    <!-- Gold arc bottom -->
    <circle cx="200" cy="530" r="200" fill="none" stroke="#D4B882" stroke-width="2"/>
  </svg>

  <div class="transition-overlay" id="transOverlay"></div>

  <div class="sheet-inner">
    <div class="handle"></div>

    <div class="coach-row">
      <div class="coach-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D4B882" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
        </svg>
      </div>
      <div class="coach-name">Palante Coach</div>
    </div>

    <div class="state-block active" id="state1">
      <div class="question">Hey Michael, how are you holding up this afternoon?</div>

      <div class="feelings">
        <button class="feeling-btn" onclick="selectFeeling(this, 'grounded')">
          <span class="pill-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
            </svg>
          </span>
          Grounded
        </button>

        <button class="feeling-btn" onclick="selectFeeling(this, 'energized')">
          <span class="pill-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </span>
          Energized
        </button>

        <button class="feeling-btn" onclick="selectFeeling(this, 'tired')">
          <span class="pill-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
          Tired
        </button>

        <button class="feeling-btn" onclick="selectFeeling(this, 'overwhelmed')">
          <span class="pill-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/>
              <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/>
              <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/>
            </svg>
          </span>
          Overwhelmed
        </button>
      </div>

      <button class="dismiss-btn" onclick="closeSheet()">Maybe later</button>
    </div>

    <div class="state-block" id="state2">
      <div class="response-block visible" id="responseContent"></div>
    </div>
  </div>
</div>

<script>
  const icons = {
    target: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
    journal: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    wind: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>`,
    music: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
    arrow: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`
  };

  const responses = {
    grounded: {
      message: "That's the foundation everything else is built on. <strong>You're in a good place right now</strong> — want to use that energy for something meaningful?",
      icon: icons.target, title: 'Set a focus for the afternoon', sub: '2 min · Add one intention', cta: 'Add intention'
    },
    energized: {
      message: "<strong>That energy is real.</strong> You've been consistent and it's showing. Want to channel it somewhere before the afternoon winds down?",
      icon: icons.journal, title: 'Quick journal entry', sub: '3 min · Capture the momentum', cta: 'Open journal'
    },
    tired: {
      message: "You've been giving a lot today. That's worth acknowledging. <strong>Let's take two minutes</strong> — your nervous system will thank you.",
      icon: icons.wind, title: 'Box Breathing', sub: '2 min · Reset your system', cta: 'Start breathing'
    },
    overwhelmed: {
      message: "That feeling is information, not a verdict. <strong>Let's slow it down for just a moment</strong> — one thing at a time.",
      icon: icons.music, title: 'Stabilize with Soundscapes', sub: '5 min · Calm the noise', cta: 'Play soundscape'
    }
  };

  function openSheet() {
    document.getElementById('sheet').classList.add('open');
    document.getElementById('backdrop').classList.add('active');
    document.getElementById('triggerWrap').classList.add('hidden');
    document.getElementById('state1').classList.add('active');
    document.getElementById('state2').classList.remove('active');
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('selected'));
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('backdrop').classList.remove('active');
    setTimeout(() => document.getElementById('triggerWrap').classList.remove('hidden'), 400);
  }

  function selectFeeling(btn, feeling) {
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    setTimeout(() => transitionToResponse(feeling), 320);
  }

  function transitionToResponse(feeling) {
    const overlay = document.getElementById('transOverlay');
    overlay.classList.add('flash');
    setTimeout(() => {
      const r = responses[feeling];
      document.getElementById('responseContent').innerHTML = `
        <p class="coach-response">${r.message}</p>
        <div class="suggestion-card" onclick="closeSheet()">
          <div class="suggestion-icon-wrap">${r.icon}</div>
          <div class="suggestion-text">
            <div class="suggestion-title">${r.title}</div>
            <div class="suggestion-sub">${r.sub}</div>
          </div>
          <div class="suggestion-arrow">${icons.arrow}</div>
        </div>
        <button class="cta-btn" onclick="closeSheet()">${r.cta}</button>
        <button class="dismiss-btn" onclick="closeSheet()">I'm good, thanks</button>
      `;
      document.getElementById('state1').classList.remove('active');
      document.getElementById('state2').classList.add('active');
      setTimeout(() => overlay.classList.remove('flash'), 50);
    }, 200);
  }
</script>
</body>
</html>
